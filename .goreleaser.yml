version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/weka/tatool-go/cmd.Version={{.Version}}
    binary: tatool

archives:
  - format: binary
    name_template: "tatool-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: weka
    name: tatool-go
